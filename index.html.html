<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="logo.png" type="image/png" >
<title>Protótipo Gamer</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
</head>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron', sans-serif;
height:100vh;
overflow:hidden;
background:black;
color:white;
}
/* Impacto no botão */
.impacto{
    transform:scale(0.9);
    box-shadow:0 0 50px #ff0000, 0 0 100px #ff6a00;
}

/* Flash cinematográfico */
.flashTela{
    position:fixed;
    inset:0;
    background:white;
    opacity:0.8;
    transition:opacity 0.4s;
    pointer-events:none;
    z-index:999;
}

/* ===== FUNDO ===== */
.background{
position:fixed;
width:100%;
height:100%;
background:url("imgpersonagem.png") no-repeat center center;
background-size:cover;
z-index:-3;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(to top, rgba(0,0,0,0.9) 20%, rgba(0,0,0,0.4));
z-index:-2;
}

.personagem-container{
    position:fixed;
    right:3%;
    bottom:-60px;
    height:110vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:-1;
}

/* Personagem */
.personagem{
    height:100%;
    animation: glowPulse 2s infinite alternate;
    filter: drop-shadow(0 0 25px rgba(255,120,0,0.8));
}
.personagem {
  animation: flutuar 3s ease-in-out infinite;
}

@keyframes flutuar {
  0% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0); }
}
/* Aura de fogo atrás */
.personagem-container::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background: radial-gradient(circle,
        rgba(255,120,0,0.8) 0%,
        rgba(255,60,0,0.6) 30%,
        rgba(255,0,0,0.3) 50%,
        transparent 70%);
    filter: blur(80px);
    z-index:-2;
    animation: auraMove 4s infinite alternate;
}

/* ===== TELAS ===== */

.tela{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:flex-start; /* joga para esquerda */
text-align:left; /* texto alinhado esquerda */
padding-left:8%; /* espaço lateral */
opacity:0;
pointer-events:none;
transition:opacity 0.8s ease;
}

.tela.ativa{
opacity:1;
pointer-events:auto;
}

/* ===== TÍTULOS ===== */
h1{
font-size:clamp(30px,5vw,50px);
color:#ff6a00;
text-shadow:0 0 15px #ff6a00,
            0 0 30px #ff3c00,
            0 0 60px #ff0000;
margin-bottom:20px;
}

h2, h3{
font-size:clamp(20px,4vw,30px);
margin-bottom:20px;
}

/* ===== BOTÕES ===== */
button{
padding:15px 45px;
font-size:15px;
font-weight:700;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff3c00,#ff8c00);
color:white;
cursor:pointer;
box-shadow:0 0 20px #ff3c00;
transition:0.3s;
position:relative;
overflow:hidden;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 30px #ff6a00, 0 0 60px #ff0000;
}

/* brilho animado */
button::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
transition:0.5s;
}

button:hover::before{
left:100%;
}

</style>
<body>
<div class="background"></div>
<div class="overlay"></div>
<div class="personagem-container">
<img src="personagem.png" class="personagem">
</div>
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mp3">
</audio>

<button onclick="document.getElementById('musica').play()">
  🔥 ATIVAR SOM
</button>
<audio id="startSound">
  <source src="click.mp3" type="audio/mp3">
</audio>
    
<!-- TELA 1 -->
<div class="tela ativa" id="tela1">
    <h1>Só os insanos sobrevivem.</h1>
<h2>Sem medo. Sem pausa. Só capa.</h2>

    <button id="btnStart" onclick="irParaTela2()">INICIAR PARTIDA</button>
</div>

<!-- TELA 2 -->
<div class="tela" id="tela2">
    <h2>LuuckyznX upou de idade…</h2>
    <h3>mas continua insano!</h3>
    <h1>LENDÁRIO DESDE O INICIO!</h1>
 <a href="https://wa.me/5575992116240?text=LuuckyznX%20quero%20confirmar%20minha%20presença%20no%20seu%20squad!" target="_blank">
    <button>BORA AMASSAR O BOLO</button>
</a>

<script>

function irParaTela2(){
document.getElementById("tela1").classList.remove("ativa");
document.getElementById("tela2").classList.add("ativa");
}

function voltar(){
document.getElementById("tela2").classList.remove("ativa");
document.getElementById("tela1").classList.add("ativa");
}

</script>
<script>
const botaoStart = document.getElementById("btnStart");
const somStart = document.getElementById("startSound");

botaoStart.addEventListener("click", function() {

    // 🔊 som curto
    somStart.currentTime = 0;
    somStart.play();

    // 💥 efeito impacto
    botaoStart.classList.add("impacto");

    // ⚡ flash na tela
    const flash = document.createElement("div");
    flash.classList.add("flashTela");
    document.body.appendChild(flash);

    setTimeout(() => {
        flash.style.opacity = "0";
    }, 100);

    setTimeout(() => {
        document.body.removeChild(flash);
        botaoStart.classList.remove("impacto");
    }, 400);

});
</script>
</body>
</html>
